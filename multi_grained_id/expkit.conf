# expkit.conf - 实验管理系统集中配置
# 所有路径均相对于项目根目录（本文件所在目录）
# ============================================================

# ---------- 项目标识 ----------
# 留空则自动使用项目目录名称
PROJECT_NAME=

# ---------- 配置文件路径 ----------
EXPERIMENTS_YAML=experiments_config.yaml
EXPERIMENTS_JSON=experiments_config.json

# ---------- 运行时文件路径 ----------
# 守护进程日志
DAEMON_LOG=logs/daemon.log
# 守护进程 PID 文件
DAEMON_PID=logs/daemon.pid
# 各实验日志目录
EXP_LOGS_DIR=logs/experiments
# 实验状态文件
STATE_FILE=experiment_manager_state.json

# ---------- 结果目录 ----------
RESULTS_DIR=results

# ---------- 守护进程参数 ----------
# 守护进程检查间隔（秒）
DAEMON_INTERVAL=30
# 实验最大重启次数
MAX_RESTARTS=3

# ---------- 资源调度阈值 ----------
# GPU 空闲判定：利用率 < 此值（%）
GPU_IDLE_UTIL=10
# GPU 空闲判定：显存占用 < 此值（MB）
GPU_IDLE_MEM_MB=500
# CPU 空闲判定：利用率 < 此值（%）
CPU_IDLE_UTIL=70

# ---------- 完成检测 ----------
# results.json 中用于判断实验完成的字段（逗号分隔，任一存在即视为完成）
COMPLETION_KEYS=auc,AUC,accuracy,loss_final
