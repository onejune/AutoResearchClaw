# AutoResearchClaw Configuration for LTV Optimization Research

project:
  name: "ltv-optimization-research"
  mode: "full-auto"

research:
  topic: "LTV (Life-Time Value) Optimization in Advertising Recommendation Systems: A Comprehensive Study of Zero-Inflated Models, Multi-timeframe Dependencies, Expert Networks, and Contrastive Learning Approaches"
  domains:
    - "machine-learning"
    - "advertising"
    - "recommendation-systems"
    - "deep-learning"
  daily_paper_count: 15
  quality_threshold: 4.5

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 3
  approval_timeout_hours: 24
  retry_limit: 3

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: true
  use_memory: true
  use_sessions_spawn: false
  use_web_fetch: true
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "${AIHUB_BASE_URL}"
  wire_api: "chat_completions"
  api_key_env: "AIHUB_API_KEY"
  api_key: ""
  primary_model: "qwen3.5-27b"
  fallback_models:
    - "qwen3.5-plus"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 600
  max_iterations: 15
  metric_key: "primary_metric"
  metric_direction: "maximize"
  sandbox:
    python_path: "/usr/bin/python3"
    gpu_required: true
    max_memory_mb: 8192
    allowed_imports:
      [
        math,
        random,
        json,
        csv,
        numpy,
        pandas,
        torch,
        sklearn,
        scipy,
        matplotlib,
        seaborn,
      ]
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 16384
    network_policy: "pip_only"
    auto_install_deps: true
    shm_size_mb: 4096
  opencode:
    enabled: true
    auto: true
    complexity_threshold: 0.3
    model: ""
    timeout_sec: 900
    max_retries: 2
    workspace_cleanup: true

  figure_agent:
    enabled: true
    min_figures: 5
    max_figures: 10
    max_iterations: 3
    render_timeout_sec: 60
    output_format: "python"
    nano_banana_enabled: false
    strict_mode: false
    dpi: 300

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
  proxy_url: "http://localhost:30000"
  skills_dir: "~/.metaclaw/skills"
  fallback_url: ""
  fallback_api_key:
  lesson_to_skill:
    enabled: false
    min_severity: "error"
    max_skills_per_run: 3

export:
  target_conference: "neurips_2025"
  authors: "Anonymous"
  bib_file: "ltv_references"
